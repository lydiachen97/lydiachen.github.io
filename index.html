<style>
:root{
  --cream:#F5EFE3;--cream-2:#FBF7EF;--card:#FFFDF8;--ink:#2B2723;--ink-soft:#6E655A;--ink-faint:#A79C8C;
  --line:#E4DBC9;--coral:#E8664E;--coral-deep:#C94A34;--butter:#F4C95D;--sky:#87A9C9;--sage:#7FA98F;--grape:#A488C0;
  --serif:'Fraunces','Noto Serif TC',serif;--sans:'Inter','Noto Sans TC',sans-serif;
  --hand:'Caveat',cursive;--note:'Caveat',cursive;--mono:'Space Mono',ui-monospace,monospace;--max:1360px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}::selection{background:var(--coral);color:#fff}
.wrap{max-width:var(--max);margin:0 auto;padding:0 26px}

header{position:sticky;top:0;z-index:60;backdrop-filter:blur(8px);background:linear-gradient(var(--cream),rgba(245,239,227,.6))}
.nav{display:flex;align-items:center;justify-content:flex-end;height:70px}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--serif);font-weight:600;font-size:1.25rem}
.brand .blob{width:32px;height:32px;background:var(--coral);color:#fff;display:grid;place-items:center;border-radius:50% 50% 50% 12px;font-family:var(--serif);font-weight:600;transform:rotate(-6deg)}
.nav-right{display:flex;align-items:center;gap:14px}
.pill{font-family:var(--mono);font-size:.66rem;background:var(--card);border:1.5px solid var(--ink);border-radius:20px;padding:6px 12px;white-space:nowrap}
.pill .live{color:var(--coral)}
@media(max-width:640px){.pill{display:none}}
.lang{display:flex;background:var(--card);border:1.5px solid var(--ink);border-radius:20px;overflow:hidden;font-family:var(--mono)}
.lang button{background:transparent;border:0;cursor:pointer;padding:6px 11px;font-size:.72rem;color:var(--ink-soft);font-family:var(--mono);transition:.15s}
.lang button.active{background:var(--ink);color:var(--cream)}
.lang button:hover:not(.active){background:var(--cream-2)}

.hero{position:relative;padding:40px 0 34px;min-height:42vh;display:flex;align-items:center;justify-content:center;text-align:center}
.hero-inner{max-width:640px;margin:0 auto;position:relative;z-index:2}
.hi{font-family:var(--hand);font-size:1.9rem;color:var(--coral);transform:rotate(-2deg);display:inline-block}
.hero h1{font-family:var(--hand);font-weight:700;font-size:clamp(2.9rem,11vw,7rem);line-height:.92;letter-spacing:.01em;margin:0 0 2px}
.hero h1 em{font-style:italic;color:var(--coral)}
.kicker{font-family:var(--serif);font-style:italic;font-size:clamp(1.05rem,2.4vw,1.35rem);color:var(--ink-soft);margin-top:4px}
