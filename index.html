<style>
:root{
  --cream:#F5EFE3;--cream-2:#FBF7EF;--card:#FFFDF8;--ink:#2B2723;--ink-soft:#6E655A;--ink-faint:#A79C8C;
  --line:#E4DBC9;--coral:#E8664E;--coral-deep:#C94A34;--butter:#F4C95D;--sky:#87A9C9;--sage:#7FA98F;--grape:#A488C0;
  --serif:'Fraunces','Noto Serif TC',serif;--sans:'Inter','Noto Sans TC',sans-serif;
  --hand:'Caveat',cursive;--mono:'Space Mono',ui-monospace,monospace;--max:1100px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}::selection{background:var(--coral);color:#fff}
.wrap{max-width:var(--max);margin:0 auto;padding:0 26px}

header{position:sticky;top:0;z-index:60;backdrop-filter:blur(8px);background:linear-gradient(var(--cream),rgba(245,239,227,.6))}
.nav{display:flex;align-items:center;justify-content:flex-end;height:70px}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--serif);font-weight:600;font-size:1.25rem}
.brand .blob{width:32px;height:32px;background:var(--coral);color:#fff;display:grid;place-items:center;border-radius:50% 50% 50% 12px;font-family:var(--serif);font-weight:600;transform:rotate(-6deg)}
.nav-right{display:flex;align-items:center;gap:14px}
.pill{font-family:var(--mono);font-size:.66rem;background:var(--card);border:1.5px solid var(--ink);border-radius:20px;padding:6px 12px;white-space:nowrap}
.pill .live{color:var(--coral)}
@media(max-width:640px){.pill{display:none}}
.lang{display:flex;background:var(--card);border:1.5px solid var(--ink);border-radius:20px;overflow:hidden;font-family:var(--mono)}
.lang button{background:transparent;border:0;cursor:pointer;padding:6px 11px;font-size:.72rem;color:var(--ink-soft);font-family:var(--mono);transition:.15s}
.lang button.active{background:var(--ink);color:var(--cream)}
.lang button:hover:not(.active){background:var(--cream-2)}

.hero{position:relative;padding:60px 0 44px;min-height:64vh;display:flex;align-items:center;justify-content:center;text-align:center}
.hero-inner{max-width:640px;margin:0 auto;position:relative;z-index:2}
.hi{font-family:var(--hand);font-size:1.9rem;color:var(--coral);transform:rotate(-2deg);display:inline-block}
.hero h1{font-family:var(--hand);font-weight:700;font-size:clamp(4rem,10vw,7rem);line-height:.92;letter-spacing:.01em;margin:0 0 2px}
.hero h1 em{font-style:italic;color:var(--coral)}
.kicker{font-family:var(--serif);font-style:italic;font-size:clamp(1.05rem,2.4vw,1.35rem);color:var(--ink-soft);margin-top:4px}
.thesis{font-family:var(--mono);font-size:clamp(.82rem,1.5vw,.98rem);line-height:1.95;color:var(--ink-soft);max-width:520px;margin:22px auto 0}
.hand-note{font-family:var(--hand);font-size:1.3rem;margin-top:22px}
.hand-note .under{border-bottom:2.5px wavy var(--butter)}
.cta-row{margin-top:30px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:30px;font-weight:500;font-size:.92rem;border:2px solid var(--ink);transition:transform .16s,background .16s,color .16s}
.btn.primary{background:var(--coral);border-color:var(--coral);color:#fff}
.btn.primary:hover{transform:translateY(-3px) rotate(-1deg);background:var(--coral-deep);border-color:var(--coral-deep)}
.btn.ghost{background:var(--card)}
.btn.ghost:hover{transform:translateY(-3px) rotate(1deg);background:var(--ink);color:var(--cream)}

.decor{position:absolute;inset:0;z-index:1;pointer-events:none}
.polaroid{position:absolute;background:#fff;padding:10px 10px 34px;border-radius:4px;box-shadow:0 10px 26px rgba(43,39,35,.16);transition:transform .25s,box-shadow .25s}
.polaroid .ph{width:100%;height:100%;border-radius:2px;display:grid;place-items:center;font-size:2.2rem}
.polaroid .cap{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:var(--hand);font-size:1.05rem}
.polaroid:hover{transform:rotate(0) scale(1.04);box-shadow:0 16px 34px rgba(43,39,35,.24);z-index:5}
.p1{width:150px;height:184px;top:6%;left:2%;transform:rotate(-8deg)}.p1 .ph{background:linear-gradient(135deg,#F4C95D,#E8664E)}
.p2{width:140px;height:172px;bottom:8%;left:5%;transform:rotate(5deg)}.p2 .ph{background:linear-gradient(135deg,#87A9C9,#7FA98F)}
.p3{width:150px;height:186px;top:9%;right:3%;transform:rotate(7deg)}.p3 .ph{background:linear-gradient(135deg,#A488C0,#87A9C9);height:100%}
.stamp{position:absolute;bottom:12%;right:6%;width:104px;height:104px;border:3px solid var(--coral);border-radius:8px;display:grid;place-items:center;color:var(--coral);transform:rotate(-12deg);background:rgba(232,102,78,.06);box-shadow:inset 0 0 0 4px rgba(232,102,78,.12)}
.stamp .cn{font-family:'Noto Sans TC',serif;font-weight:700;font-size:1.7rem;writing-mode:vertical-rl;letter-spacing:.08em}
.stamp .en{position:absolute;bottom:6px;font-family:var(--mono);font-size:.5rem;letter-spacing:.12em}
.star{position:absolute;top:16%;left:16%;font-size:1.8rem;animation:bob 3.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-9px) rotate(12deg)}}
@media(max-width:900px){.hero{min-height:auto;padding:46px 0 30px}.decor{display:none}}

section{padding:64px 0}
.mark{font-family:var(--serif);font-weight:600;font-size:clamp(1.6rem,4vw,2.3rem);display:flex;align-items:center;gap:12px;margin-bottom:8px}
.mark .sym{color:var(--coral)}
.sub{color:var(--ink-soft);margin-bottom:32px}
.cooking{background:var(--ink);color:var(--cream);border-radius:26px;padding:38px;position:relative;overflow:hidden}
.cooking::after{content:"🍳";position:absolute;right:26px;top:22px;font-size:2.4rem;animation:bob 4s ease-in-out infinite}
.cooking .lbl{font-family:var(--hand);font-size:1.5rem;color:var(--butter)}
.cooking h2{font-family:var(--serif);font-weight:600;font-size:clamp(1.5rem,3.6vw,2.1rem);margin:8px 0 14px;max-width:640px}
.cooking p{color:#E9E2D4;max-width:660px}
.cooking .tape{position:absolute;left:-30px;top:24px;width:120px;height:26px;background:rgba(244,201,93,.5);transform:rotate(-38deg)}

.work{display:grid;gap:26px}
.wcard{display:grid;grid-template-columns:300px 1fr;gap:26px;background:var(--card);border:2px solid var(--ink);border-radius:22px;padding:20px;align-items:center;transition:transform .2s,box-shadow .2s}
.wcard:hover{transform:translateY(-4px) rotate(-.4deg);box-shadow:8px 8px 0 var(--ink)}
.wcard .thumb{height:190px;border-radius:14px;display:grid;place-items:center;font-size:3rem;color:#fff}
.wcard:nth-child(1) .thumb{background:linear-gradient(135deg,#E8664E,#F4C95D)}
.wcard:nth-child(2) .thumb{background:linear-gradient(135deg,#87A9C9,#A488C0)}
.wcard:nth-child(3) .thumb{background:linear-gradient(135deg,#7FA98F,#F4C95D)}
.wcard h3{font-family:var(--serif);font-weight:600;font-size:1.5rem}
.wmeta{font-family:var(--mono);font-size:.72rem;color:var(--coral);margin:4px 0 10px}
.wcard p{color:var(--ink-soft);font-size:.98rem}
.wtags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.wtags span{font-size:.76rem;background:var(--cream);border:1.5px solid var(--line);border-radius:14px;padding:4px 11px}
@media(max-width:680px){.wcard{grid-template-columns:1fr}}

.other{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.ocard{background:var(--card);border:2px solid var(--ink);border-radius:18px;padding:22px;transition:transform .18s}
.ocard:hover{transform:translateY(-4px) rotate(.6deg)}
.ocard .emoji{font-size:1.7rem}.ocard h4{font-family:var(--serif);font-weight:600;font-size:1.2rem;margin:8px 0 4px}
.ocard .oy{font-family:var(--mono);font-size:.66rem;color:var(--ink-faint)}
.ocard p{color:var(--ink-soft);font-size:.92rem;margin-top:8px}
.ocard .go{margin-top:12px;font-family:var(--mono);font-size:.7rem;color:var(--coral);border-bottom:2px solid var(--butter);display:inline-block;padding-bottom:1px}
@media(max-width:560px){.other{grid-template-columns:1fr}}

.gallery{columns:3;column-gap:16px}
@media(max-width:820px){.gallery{columns:2}}@media(max-width:440px){.gallery{columns:1}}
.gtile{position:relative;display:block;break-inside:avoid;margin-bottom:16px;border-radius:16px;overflow:hidden;border:2px solid var(--ink);box-shadow:4px 4px 0 var(--ink);transition:transform .2s,box-shadow .2s}
.gtile:hover{transform:translateY(-4px) rotate(-.5deg);box-shadow:8px 8px 0 var(--coral)}
.gtile .media{width:100%;display:block;transition:transform .55s}.gtile:hover .media{transform:scale(1.07)}
.gtile .ph{display:grid;place-items:center;font-size:2.6rem;color:#fff}
.gov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;background:linear-gradient(to top,rgba(43,39,35,.85),rgba(43,39,35,.08) 55%,transparent);opacity:0;transition:opacity .3s}
.gtile:hover .gov,.gtile:focus-visible .gov{opacity:1}
.gov .cap{color:#fff;font-family:var(--serif);font-weight:500;font-size:1.08rem}
.gov .view{color:#fff;font-family:var(--mono);font-size:.66rem;margin-top:5px;display:flex;align-items:center;gap:6px;opacity:.92}
.gov .view svg{width:13px;height:13px}
.ig-badge{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:#fff;color:var(--coral);display:grid;place-items:center;transform:scale(.5);opacity:0;transition:transform .3s,opacity .3s}
.gtile:hover .ig-badge{transform:scale(1);opacity:1}
.gallery.juicer,.gallery.embed{column-count:1;column-gap:0}
.gallery.juicer .juicer-feed{width:100%}
.ig-follow{display:inline-flex;align-items:center;gap:9px;margin-top:26px;padding:12px 22px;border-radius:30px;border:2px solid var(--ink);background:var(--card);font-weight:500;transition:.18s}
.ig-follow:hover{background:linear-gradient(135deg,#E8664E,#A488C0);color:#fff;border-color:transparent;transform:translateY(-3px) rotate(-1deg)}
.ig-follow .h{font-family:var(--mono);font-size:.82rem}

.langs{display:flex;flex-wrap:wrap;gap:14px}
.lcard{background:var(--card);border:2px solid var(--ink);border-radius:18px;padding:16px 20px;min-width:150px;flex:1 1 150px;transition:transform .18s}
.lcard:hover{transform:translateY(-4px) rotate(-1deg)}
.lcard .greet{font-family:var(--serif);font-weight:600;font-size:1.5rem}
.lcard .lname{font-size:.86rem;color:var(--ink-soft);margin-top:2px}
.lcard .lbar{height:6px;background:var(--cream);border-radius:4px;margin-top:12px;overflow:hidden;border:1px solid var(--line)}
.lcard .lbar span{display:block;height:100%;width:0;background:var(--coral);border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.lcard .llvl{font-family:var(--mono);font-size:.62rem;color:var(--ink-faint);margin-top:7px}

.about-grid{display:grid;grid-template-columns:1.3fr .7fr;gap:36px;align-items:start}
.about-grid p{font-size:1.08rem;color:var(--ink-soft);margin-bottom:16px}
.links{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.links a{font-family:var(--mono);font-size:.76rem;background:var(--card);border:2px solid var(--ink);border-radius:20px;padding:8px 15px;transition:.16s}
.links a:hover{background:var(--coral);border-color:var(--coral);color:#fff;transform:translateY(-2px)}
.chat{background:var(--card);border:2px solid var(--ink);border-radius:22px;padding:18px;box-shadow:6px 6px 0 var(--ink)}
.chat .top{font-family:var(--mono);font-size:.66rem;color:var(--ink-faint);text-align:center;margin-bottom:12px}
.bubble{max-width:80%;padding:9px 14px;border-radius:18px;margin-bottom:9px;font-size:.9rem;line-height:1.45}
.bubble.them{background:var(--cream);border:1.5px solid var(--line);border-bottom-left-radius:5px}
.bubble.me{background:var(--coral);color:#fff;margin-left:auto;border-bottom-right-radius:5px}
@media(max-width:760px){.about-grid{grid-template-columns:1fr}}

footer{padding:40px 0 60px;text-align:center}
.foot-note{font-family:var(--hand);font-size:1.7rem}.foot-mini{font-family:var(--mono);font-size:.66rem;color:var(--ink-faint);margin-top:8px}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s}.reveal.in{opacity:1;transform:none}
:focus-visible{outline:3px solid var(--coral);outline-offset:3px;border-radius:6px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.reveal{opacity:1;transform:none}}

/* ============ ADMIN ============ */
.gear{position:fixed;right:18px;bottom:18px;z-index:70;width:50px;height:50px;border-radius:50%;background:var(--ink);color:var(--cream);border:0;cursor:pointer;font-size:1.3rem;box-shadow:0 8px 20px rgba(43,39,35,.3);transition:transform .2s}
.gear:hover{transform:rotate(45deg) scale(1.06)}
.admin{position:fixed;top:0;right:0;height:100%;width:420px;max-width:100%;background:var(--cream-2);z-index:80;box-shadow:-14px 0 40px rgba(43,39,35,.2);transform:translateX(102%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.admin.open{transform:none}
.admin .ahead{padding:16px 18px;border-bottom:2px solid var(--ink);display:flex;align-items:center;gap:10px;background:var(--ink);color:var(--cream)}
.admin .ahead b{font-family:var(--serif);font-size:1.1rem;flex:1}
.admin .ahead button{background:transparent;border:1.5px solid var(--cream);color:var(--cream);border-radius:16px;padding:5px 10px;font-size:.7rem;font-family:var(--mono);cursor:pointer}
.admin .ahead .x{border:0;font-size:1.3rem;padding:0 6px}
.abody{overflow-y:auto;padding:14px 18px 60px;flex:1}
.saved{font-family:var(--mono);font-size:.64rem;color:var(--sage);height:14px;margin-bottom:6px}
.grp{border:1.5px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--card);overflow:hidden}
.grp>summary{cursor:pointer;padding:11px 14px;font-family:var(--serif);font-weight:600;font-size:1rem;list-style:none;display:flex;align-items:center;gap:8px}
.grp>summary::-webkit-details-marker{display:none}
.grp>summary::before{content:"▸";color:var(--coral);transition:transform .2s}
.grp[open]>summary::before{transform:rotate(90deg)}
.gc{padding:4px 14px 14px}
.fld{margin-bottom:12px}
.fld>label{display:block;font-size:.74rem;color:var(--ink-soft);margin-bottom:4px;font-weight:600}
.fld input,.fld textarea,.fld select{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:8px 10px;font-family:var(--sans);font-size:.86rem;background:var(--cream-2);color:var(--ink);resize:vertical}
.fld textarea{min-height:52px}
.fld select{cursor:pointer;font-size:.95rem}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:2px solid var(--coral);border-color:var(--coral)}
.mltab{display:flex;gap:4px;margin-bottom:5px}
.mltab button{font-family:var(--mono);font-size:.6rem;border:1.5px solid var(--line);background:var(--cream-2);border-radius:12px;padding:3px 9px;cursor:pointer;color:var(--ink-soft)}
.mltab button.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.item{border:1.5px dashed var(--line);border-radius:10px;padding:10px;margin-bottom:10px;position:relative}
.item .del{position:absolute;top:8px;right:8px;background:var(--coral);color:#fff;border:0;border-radius:8px;font-size:.62rem;padding:3px 8px;cursor:pointer;font-family:var(--mono)}
.addbtn{width:100%;border:1.5px dashed var(--coral);color:var(--coral);background:transparent;border-radius:10px;padding:8px;cursor:pointer;font-family:var(--mono);font-size:.74rem}
.hint{font-size:.68rem;color:var(--ink-faint);margin:2px 0 8px;line-height:1.5}
.fontchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.fchip{font-family:var(--mono);font-size:.62rem;border:1.5px solid var(--line);background:var(--cream-2);border-radius:12px;padding:3px 8px;cursor:pointer;color:var(--ink-soft)}
.fchip:hover{border-color:var(--coral);color:var(--coral)}
.fontprev{margin-top:8px;padding:10px 12px;border:1.5px dashed var(--line);border-radius:9px;background:#fff;font-size:1.35rem;line-height:1.35;color:var(--ink)}
.admin-overlay{position:fixed;inset:0;background:rgba(43,39,35,.4);z-index:75;opacity:0;pointer-events:none;transition:opacity .3s}
.modrow{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--card)}
.modname{font-family:var(--serif);font-weight:600}
.modbtns button{border:1.5px solid var(--ink);background:var(--cream-2);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;margin-left:5px;color:var(--ink)}
.modbtns button:disabled{opacity:.28;cursor:default}
.admin-overlay.open{opacity:1;pointer-events:auto}
@media(max-width:520px){.admin{width:100%}}

/* ================= STATE / STORAGE ================= */
const LS_KEY="lydia_site_content_v1";
const LANGS=["zh","en","ko"];
const LANG_LABEL={zh:"中",en:"EN",ko:"한"};
const HTML_LANG={zh:"zh-Hant",en:"en",ko:"ko"};
let LANG="zh", STATE=null, galleryBuilt=false;

function clone(o){return JSON.parse(JSON.stringify(o));}
function isObj(x){return x&&typeof x==="object"&&!Array.isArray(x);}
function merge(def,ov){
  if(Array.isArray(def)) return Array.isArray(ov)?ov:clone(def);
  if(isObj(def)){const out={};for(const k in def)out[k]=merge(def[k], ov&&ov[k]!==undefined?ov[k]:undefined);return out;}
  return ov!==undefined?ov:def;
}
function saveLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(STATE));flashSaved();}catch(e){flashSaved("（此環境無法儲存，本次有效）");}}
function loadLocal(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function flashSaved(msg){const s=document.getElementById("saved");if(!s)return;s.textContent=msg||"✓ 已儲存";clearTimeout(flashSaved._t);flashSaved._t=setTimeout(()=>s.textContent="",1600);}

const t=(o)=>(o&&o[LANG])||(o&&o.en)||"";
const IG_URL=()=>STATE.settings.instagram||"#";
const IGICON=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:18px;height:18px"><rect x="2.5" y="2.5" width="19" height="19" rx="5.5"/><circle cx="12" cy="12" r="4.2"/><circle cx="17.6" cy="6.4" r="1.1" fill="currentColor" stroke="none"/></svg>`;

/* 動態載入 Google Fonts：打進字體名稱就自動抓（存在才顯示，否則自動退回備用字體） */
const loadedFonts=new Set();
const GENERIC=["serif","sans-serif","monospace","cursive","system-ui","ui-monospace","ui-serif","ui-sans-serif","-apple-system"];
function loadGoogleFont(name){
  name=(name||"").trim().replace(/^['"]|['"]$/g,"");
  if(!name||GENERIC.includes(name.toLowerCase()))return;
  if((STATE&&STATE.settings&&STATE.settings.customFonts||[]).some(f=>(f.name||"").toLowerCase()===name.toLowerCase()))return;
  const key=name.toLowerCase();if(loadedFonts.has(key))return;loadedFonts.add(key);
  const l=document.createElement("link");l.rel="stylesheet";
  l.href="https://fonts.googleapis.com/css2?family="+encodeURIComponent(name).replace(/%20/g,"+")+"&display=swap";
  document.head.appendChild(l);
}
function loadStack(stack){(stack||"").split(",").forEach(loadGoogleFont);}
function loadAllFonts(){for(const l in STATE.settings.fonts){loadStack(STATE.settings.fonts[l].serif);loadStack(STATE.settings.fonts[l].sans);}}

/* ================= VIEWER RENDER ================= */
function applyFonts(){
  const f=STATE.settings.fonts[LANG]||STATE.settings.fonts.en;
  const S=document.documentElement.style;
  S.setProperty("--serif",f.serif);S.setProperty("--sans",f.sans);
  if(f.hand)S.setProperty("--hand",f.hand);
  if(f.mono)S.setProperty("--mono",f.mono);
}
function injectCustomFonts(){
  let el=document.getElementById("custom-fonts");
  if(!el){el=document.createElement("style");el.id="custom-fonts";document.head.appendChild(el);}
  el.textContent=(STATE.settings.customFonts||[]).map(f=>`@font-face{font-family:'${(f.name||"").replace(/'/g,"")}';src:url(${f.url});font-display:swap;}`).join("\n");
}
function renderStatic(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n");if(STATE.ui[k])el.innerHTML=t(STATE.ui[k]);});
  document.getElementById("about-body").innerHTML="<p>"+t(STATE.ui.aboutBody)+"</p>";
}
function renderLinks(){
  const s=STATE.settings;
  const e=document.getElementById("lnk-email");e.href="mailto:"+s.email;e.textContent="✉ "+s.email;
  document.getElementById("lnk-linkedin").href=s.linkedin;
  document.getElementById("lnk-ig").href=s.instagram;
  document.getElementById("lnk-youtube").href=s.youtube;
  const f=document.getElementById("ig-follow");f.href=s.instagram;
  document.getElementById("ig-follow-icon").innerHTML=IGICON;
  const h=(s.instagram.split("/").filter(Boolean).pop()||"").replace(/\?.*$/,"");
  document.getElementById("ig-handle").textContent="@"+h;
}
function renderBrand(){
  const s=STATE.settings;
  const setTxt=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  setTxt("brand-name",s.brand);setTxt("brand-mono",s.monogram);setTxt("hero-name",s.heroName);
  setTxt("footer-mini",s.footer);setTxt("chat-top",s.imessage);
  (s.collage||[]).forEach((c,i)=>{setTxt("ph-"+i,c.emoji);setTxt("cap-"+i,c.cap);});
  const st=s.stamp||{};setTxt("stamp-cn",st.cn);setTxt("stamp-en",st.en);
}
function renderWork(){
  document.getElementById("work-list").innerHTML=STATE.work.map(w=>`
    <div class="wcard"><div class="thumb">${w.emoji||"◆"}</div><div>
      <h3>${w.title||""}</h3><div class="wmeta">${t(w.meta)}</div><p>${t(w.desc)}</p>
      <div class="wtags">${(w.tags||[]).map(x=>`<span>${x}</span>`).join("")}</div>
    </div></div>`).join("");
}
function renderOther(){
  document.getElementById("other-list").innerHTML=STATE.other.map(o=>`
    <a class="ocard" href="${o.url||"#"}" target="_blank" rel="noopener">
      <div class="emoji">${o.emoji||"✦"}</div><h4>${t(o.title)}</h4><div class="oy">${o.year||""}</div>
      <p>${t(o.desc)}</p><span class="go">${t(o.go)}</span></a>`).join("");
}
function renderLangs(){
  document.getElementById("lang-list").innerHTML=STATE.languages.map(l=>`
    <div class="lcard"><div class="greet">${l.greet||""}</div><div class="lname">${l.name||""}</div>
      <div class="lbar"><span data-pct="${l.pct||0}"></span></div><div class="llvl">${t(l.lvl)}</div></div>`).join("");
  requestAnimationFrame(()=>document.querySelectorAll(".lbar span").forEach(b=>b.style.width=b.dataset.pct+"%"));
}
function renderGallery(force){
  const grid=document.getElementById("gallery-grid");
  const posts=(STATE.settings.igPosts||"").split("\n").map(s=>s.trim()).filter(u=>u.indexOf("instagram.com")>=0);
  const feed=(STATE.settings.juicer||"").trim();
  if(force)galleryBuilt=false;

  if(posts.length){
    grid.classList.remove("juicer");grid.classList.add("embed");
    if(!galleryBuilt){
      grid.innerHTML=posts.map(u=>`<blockquote class="instagram-media" data-instgrm-permalink="${u}" data-instgrm-version="14"></blockquote>`).join("");
      if(!document.getElementById("ig-embed-js")){
        const s=document.createElement("script");s.id="ig-embed-js";s.async=true;s.src="https://www.instagram.com/embed.js";document.body.appendChild(s);
      }
      galleryBuilt=true;
    }
    if(window.instgrm&&window.instgrm.Embeds)window.instgrm.Embeds.process();
    return;
  }

  if(feed){
    grid.classList.remove("embed");grid.classList.add("juicer");
    if(!galleryBuilt){
      grid.innerHTML=`<ul class="juicer-feed" data-feed-id="${feed}" data-columns="3" data-per="9"></ul>`;
      let s=document.getElementById("juicer-js");
      if(s)s.remove();
      s=document.createElement("script");s.id="juicer-js";s.async=true;s.defer=true;
      s.src="https://www.juicer.io/embed/"+feed+"/embed-code.js";document.body.appendChild(s);
      galleryBuilt=true;
    } else if(window.juicer&&window.juicer.load){try{window.juicer.load();}catch(e){}}
    return;
  }

  grid.classList.remove("juicer","embed");grid.innerHTML="";
}
function renderContent(){injectCustomFonts();applyFonts();renderBrand();renderStatic();renderLinks();renderWork();renderOther();renderLangs();}
function applyOrder(){const main=document.querySelector("main");(STATE.order||[]).forEach(id=>{const el=document.getElementById(id);if(el)main.appendChild(el);});}
function renderAll(){renderContent();renderGallery();applyOrder();}

function setLang(lang){
  LANG=lang;document.documentElement.setAttribute("lang",HTML_LANG[lang]);
  document.querySelectorAll(".lang button").forEach(b=>b.classList.toggle("active",b.dataset.lang===lang));
  renderContent();
}
document.querySelectorAll(".lang button").forEach(b=>b.addEventListener("click",()=>setLang(b.dataset.lang)));

const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}})},{threshold:.1});
function observe(){document.querySelectorAll(".cooking,.wcard,.ocard,.lcard,.about-grid,.chat").forEach(el=>{el.classList.add("reveal");io.observe(el);});}

/* ================= BOOT ================= */
async function boot(){
  let data=null;
  try{const r=await fetch("content.json",{cache:"no-store"});if(r.ok)data=await r.json();}catch(e){}
  if(!data&&window.__SEED__)data=window.__SEED__;
  if(!data)data=loadLocal();
  STATE=data?merge(DEFAULTS,data):clone(DEFAULTS);
  loadAllFonts();
  renderAll();observe();
}
boot();
</script>
