<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>作品集 · Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{--cream:#F5EFE3;--card:#FFFDF8;--ink:#2B2723;--soft:#6E655A;--faint:#A79C8C;--line:#E4DBC9;--coral:#E8664E;--butter:#F4C95D}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'Noto Sans TC',sans-serif;padding:36px 20px 60px}
.wrap{max-width:1100px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:8px}
a.back{font-family:'Space Mono',monospace;font-size:.82rem;color:var(--ink);text-decoration:none;border:2px solid var(--ink);border-radius:20px;padding:7px 16px;background:var(--card);box-shadow:3px 3px 0 var(--ink)}
a.back:hover{background:var(--butter)}
h1{font-family:'Fraunces','Noto Sans TC',serif;font-weight:600;font-size:2.4rem}
.sub{color:var(--soft);margin:2px 0 26px;font-size:1.02rem}
.grid{columns:3;column-gap:16px}
@media(max-width:820px){.grid{columns:2}}
@media(max-width:520px){.grid{columns:1}}
.grid img{width:100%;margin:0 0 16px;border-radius:14px;border:2px solid var(--ink);box-shadow:4px 4px 0 var(--ink);display:block;cursor:zoom-in;break-inside:avoid;background:var(--card)}
.empty{color:var(--faint);font-family:'Space Mono',monospace;padding:40px 0;text-align:center}
.lb{position:fixed;inset:0;background:rgba(43,39,35,.9);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;cursor:zoom-out}
.lb.show{display:flex}
.lb img{max-width:96vw;max-height:92vh;border-radius:10px}
.foot{text-align:center;color:var(--faint);font-family:'Space Mono',monospace;font-size:.72rem;margin-top:40px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1 id="title">作品集</h1>
    <a class="back" href="index.html">← 回首頁</a>
  </div>
  <p class="sub" id="sub">用鏡頭記錄光影、旅程與生活裡的小細節。</p>
  <!-- ★ 音樂播放器貼在這裡 ★ -->
  <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/album/2zEdi42kfgLEySoikGJMFT?utm_source=generator&si=ec1b8071c1ea4a96" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
   <!-- ★ 結束 ★ -->
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">還沒有照片。到後台「作品集相簿頁」加入照片路徑，或把照片放進 images/ 資料夾。</div>
  <p class="foot">Lydia · Gallery</p>
</div>
<div class="lb" id="lb"><img id="lbimg" src="" alt=""></div>
<script>
(async function(){
  let photos=[];
  try{
    const r=await fetch("content.json",{cache:"no-store"});
    if(r.ok){const d=await r.json();photos=((d.settings&&d.settings.galleryPhotos)||"").split("\n").map(s=>s.trim()).filter(Boolean);}
  }catch(e){}
  const grid=document.getElementById("grid"),empty=document.getElementById("empty");
  if(!photos.length){empty.style.display="block";return;}
  grid.innerHTML=photos.map(u=>`<img src="${u}" alt="" loading="lazy">`).join("");
  const lb=document.getElementById("lb"),lbimg=document.getElementById("lbimg");
  grid.querySelectorAll("img").forEach(im=>im.addEventListener("click",()=>{lbimg.src=im.src;lb.classList.add("show");}));
  lb.addEventListener("click",()=>lb.classList.remove("show"));
})();
</script>
</body>
</html>
