<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>作品集 · Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root{--cream:#F5EFE3;--card:#FFFDF8;--ink:#2B2723;--soft:#6E655A;--faint:#A79C8C;--line:#E4DBC9;--coral:#E8664E;--butter:#F4C95D}
*{box-sizing:border-box;margin:0;padding:0}
body{background:transparent;color:var(--ink);font-family:'Noto Sans TC',sans-serif;padding:36px 20px 60px}
.wrap{max-width:1100px;margin:0 auto}
.top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:8px}
a.back{font-family:'Space Mono',monospace;font-size:.82rem;color:var(--ink);text-decoration:none;border:2px solid var(--ink);border-radius:20px;padding:7px 16px;background:var(--card);box-shadow:3px 3px 0 var(--ink)}
a.back:hover{background:var(--butter)}
h1{font-family:'Fraunces','Noto Sans TC',serif;font-weight:600;font-size:2.4rem}
.sub{color:var(--soft);margin:2px 0 26px;font-size:1.02rem}
.grid{columns:3;column-gap:16px}
@media(max-width:820px){.grid{columns:2}}
@media(max-width:520px){.grid{columns:1}}
.grid img{width:100%;margin:0 0 16px;border-radius:14px;border:2px solid var(--ink);box-shadow:4px 4px 0 var(--ink);display:block;cursor:zoom-in;break-inside:avoid;background:var(--card);min-height:60px}
.broken{width:100%;margin:0 0 16px;border-radius:14px;border:2px dashed var(--coral);background:#FDEEEA;box-shadow:4px 4px 0 var(--ink);break-inside:avoid;padding:22px 18px;text-align:center}
.broken .x{font-size:1.6rem}
.broken .t{font-family:'Fraunces',serif;font-weight:600;margin-top:4px;color:var(--coral)}
.broken .p{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--ink);word-break:break-all;margin-top:6px;background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:6px 8px}
.alert{border:2px solid var(--coral);background:#FDEEEA;border-radius:14px;padding:14px 18px;margin-bottom:20px;box-shadow:4px 4px 0 var(--ink);font-size:.92rem;display:none}
.alert.show{display:block}
.alert b{color:var(--coral)}
.alert ul{margin:8px 0 0 20px;font-size:.88rem}
.alert li{margin-bottom:4px}
.alert code{font-family:'Space Mono',monospace;background:#fff;border:1.5px solid var(--line);border-radius:6px;padding:1px 6px;font-size:.78rem}
.empty{color:var(--soft);font-family:'Space Mono',monospace;padding:40px 0;text-align:center}
.lb{position:fixed;inset:0;background:rgba(43,39,35,.9);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;cursor:zoom-out}
.lb.show{display:flex}
.lb img{max-width:96vw;max-height:92vh;border-radius:10px}
.foot{text-align:center;color:var(--faint);font-family:'Space Mono',monospace;font-size:.72rem;margin-top:40px}

/* ★ 貼在這裡：背景專屬 CSS 開始 ★ */
.background {
position: fixed;
z-index: -1;
overflow: hidden;
width: 100vw;
height: 100vh;
top: 0;
left: 0;
background: linear-gradient(to right, #c5eafc, #fff1ad);
display: flex;
flex-grow: 1;
}
.background div {
position: absolute;
border-radius: 100%;
height: 0;
filter: blur(120px);
opacity: 0.4;
}
.background div:nth-child(1) {
background: linear-gradient(132deg, #1FCFC3 0.00%, #1F91CF 100.00%);
width: 30%;
padding-top: 30%;
left: 39%;
top: 22%;
transform: translateX(-50%) translateY(-50%);
}
.background div:nth-child(2) {
background: linear-gradient(132deg, #0800FF 0.00%, #E32BE3 100.00%);
width: 40%;
padding-top: 40%;
left: 50%;
top: 50%;
transform: translateX(-50%) translateY(-50%);
}
.background div:nth-child(3) {
background: linear-gradient(132deg, #1FCFC3 0.00%, #1F91CF 100.00%);
width: 30%;
padding-top: 30%;
left: 80%;
top: 80%;
transform: translateX(-50%) translateY(-50%);
}
/* ★ 背景專屬 CSS 結束 ★ */
</style>
</head>
<body>
<!-- ★ 漸層背景 ★ -->
<div class="background">
   <div></div>
   <div></div>
   <div></div>
</div>

<div class="wrap">
  <div class="top">
    <h1 id="title">作品集</h1>
    <a class="back" href="index.html">← 回首頁</a>
  </div>
  <p class="sub" id="sub">用鏡頭記錄光影、旅程與生活裡的小細節。</p>

  <div class="alert" id="alert"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">還沒有照片。到後台「作品集相簿頁」加入照片路徑，或把照片放進 images/ 資料夾。</div>

  <p class="foot">Lydia · Gallery</p>
</div>

<div class="lb" id="lb"><img id="lbimg" src="" alt=""></div>

<script>
(async function(){
  var photos=[];
  try{
    var r=await fetch("content.json",{cache:"no-store"});
    if(r.ok){
      var d=await r.json();
      photos=((d.settings&&d.settings.galleryPhotos)||"").split("\n")
        .map(function(s){return s.trim();}).filter(Boolean);
    }
  }catch(e){}

  var grid=document.getElementById("grid");
  var empty=document.getElementById("empty");
  var alertBox=document.getElementById("alert");

  if(!photos.length){ empty.style.display="block"; return; }

  var failed=[];

  function showAlert(){
    if(!failed.length){ alertBox.className="alert"; return; }
    alertBox.innerHTML=
      "<b>⚠ 有 "+failed.length+" 張照片載不到</b>（檔案不在 images/ 或檔名對不上）"+
      "<ul>"+failed.map(function(p){return "<li><code>"+p+"</code></li>";}).join("")+"</ul>"+
      "<ul style='margin-top:8px'>"+
      "<li>到 GitHub 點進 <code>images/</code>，確認這些檔案<b>真的在裡面</b></li>"+
      "<li>檔名要<b>完全一致、分大小寫</b>：<code>.JPG</code> 和 <code>.jpg</code> 不一樣</li>"+
      "<li>開頭的底線 <code>_</code> 也要有</li>"+
      "</ul>";
    alertBox.className="alert show";
  }

  photos.forEach(function(src){
    var im=new Image();
    im.alt="";
    im.loading="lazy";
    im.src=src;
    im.addEventListener("error",function(){
      var box=document.createElement("div");
      box.className="broken";
      box.innerHTML='<div class="x">🖼️</div><div class="t">找不到這張照片</div><div class="p">'+src+'</div>';
      if(im.parentNode) im.parentNode.replaceChild(box,im); else grid.appendChild(box);
      failed.push(src);
      showAlert();
    });
    im.addEventListener("click",function(){
      document.getElementById("lbimg").src=im.src;
      document.getElementById("lb").classList.add("show");
    });
    grid.appendChild(im);
  });

  document.getElementById("lb").addEventListener("click",function(){
    this.classList.remove("show");
  });
})();
</script>
</body>
</html>
