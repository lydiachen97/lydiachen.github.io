<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lydia — Quality · Supply Chain · Stories ☺︎</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=Caveat:wght@500;600;700&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+TC:wght@500;600;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ==========================================
   最終版：黑色外框 + 粉藍色字底的卡片刷開特效
========================================== */
.ocard .go {
  position: relative;
  text-decoration: none !important;
  color: #BDEFF7 !important; /* 強制設定字體本身為粉藍色 */
  font-weight: 700;
  
  /* 俐落的黑色外框（精準設定 1px 避免粗糙疊影） */
  text-shadow: -1px 0 #2B2723, 0 1px #2B2723, 1px 0 #2B2723, 0 -1px #2B2723 !important;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
  border-bottom: none !important;
  padding-bottom: 0;
  background: transparent !important;
}

.ocard .go::after {
  content: attr(data-text); 
  color: #BEC6F7 !important;
  position: absolute;
  top: 0;
  left: 0;
  
  /* 配合卡片底色 #FFFDF8 的遮罩陰影，讓未刷開的部分完美融合背景 */
  text-shadow: -1px 0 #FFFDF8, 0 1px #FFFDF8, 1px 0 #FFFDF8, 0 -1px #FFFDF8 !important;
  width: 100%;
  white-space: nowrap;
  overflow: hidden;
  -webkit-transition: width 1s ease; /* 舒適流暢的動畫速度 */
  transition: width 1s ease;
}

.ocard .go:hover::after {
  width: 0%;
}
:root{
  --cream:#F5EFE3;--cream-2:#FBF7EF;--card:#FFFDF8;--ink:#2B2723;--ink-soft:#6E655A;--ink-faint:#A79C8C;
  --line:#E4DBC9;--coral:#E8664E;--coral-deep:#C94A34;--butter:#F4C95D;--sky:#87A9C9;--sage:#7FA98F;--grape:#A488C0;
  --serif:'Fraunces','Noto Serif TC',serif;--sans:'Inter','Noto Sans TC',sans-serif;
  --hand:'Caveat',cursive;--note:'Caveat',cursive;--mono:'Space Mono',ui-monospace,monospace;--max:1440px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:transparent;color:var(--ink);font-family:var(--sans);line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}::selection{background:var(--coral);color:#fff}
.wrap{max-width:var(--max);margin:0 auto;padding:0 26px}

header{position:sticky;top:0;z-index:60;backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);background:transparent}
.nav{display:flex;align-items:center;justify-content:flex-end;height:70px}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--serif);font-weight:600;font-size:1.25rem}
.brand .blob{width:32px;height:32px;background:var(--coral);color:#fff;display:grid;place-items:center;border-radius:50% 50% 50% 12px;font-family:var(--serif);font-weight:600;transform:rotate(-6deg)}
.nav-right{display:flex;align-items:center;gap:14px}
.pill{font-family:var(--mono);font-size:.66rem;background:var(--card);border:1.5px solid var(--ink);border-radius:20px;padding:6px 12px;white-space:nowrap}
.pill .live{color:var(--coral)}
@media(max-width:640px){.pill{display:none}}
.lang{display:flex;background:var(--card);border:1.5px solid var(--ink);border-radius:20px;overflow:hidden;font-family:var(--mono)}
.lang button{background:transparent;border:0;cursor:pointer;padding:6px 11px;font-size:.72rem;color:var(--ink-soft);font-family:var(--mono);transition:.15s}
.lang button.active{background:var(--ink);color:var(--cream)}
.lang button:hover:not(.active){background:var(--cream-2)}

.hero{position:relative;padding:40px 0 34px;min-height:42vh;display:flex;align-items:center;justify-content:center;text-align:center}
.hero-inner{max-width:720px;margin:0 auto;position:relative;z-index:2}
.hi{font-family:var(--hand);font-size:1.9rem;color:var(--coral);transform:rotate(-2deg);display:inline-block}
.hero h1{font-family:var(--hand);font-weight:700;font-size:clamp(2.9rem,11vw,7rem);line-height:.92;letter-spacing:.01em;margin:0 0 2px}
.hero h1 em{font-style:italic;color:var(--coral)}
.kicker{font-family:var(--serif);font-style:italic;font-size:clamp(1.05rem,2.4vw,1.35rem);color:var(--ink-soft);margin-top:4px}
.thesis{font-family:var(--mono);font-size:clamp(.82rem,1.5vw,.98rem);line-height:1.95;color:var(--ink-soft);max-width:600px;margin:22px auto 0}
.hand-note{font-family:var(--note);font-size:1.3rem;margin-top:22px}
.hand-note .under{border-bottom:2.5px wavy var(--butter)}
.cta-row{margin-top:30px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:30px;font-weight:500;font-size:.92rem;border:2px solid var(--ink);transition:transform .16s,background .16s,color .16s}
.btn.primary{background:var(--coral);border-color:var(--coral);color:#fff}
.btn.primary:hover{transform:translateY(-3px) rotate(-1deg);background:var(--coral-deep);border-color:var(--coral-deep)}
.btn.ghost{background:var(--card)}
.btn.ghost:hover{transform:translateY(-3px) rotate(1deg);background:var(--ink);color:var(--cream)}

.decor{position:absolute;inset:0;z-index:1;pointer-events:none}
.polaroid{position:absolute;background:#fff;padding:10px 10px 34px;border-radius:4px;box-shadow:0 10px 26px rgba(43,39,35,.16);transition:transform .25s,box-shadow .25s}
.polaroid .ph{width:100%;height:100%;border-radius:2px;display:grid;place-items:center;font-size:2.2rem}
.polaroid .cap{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:var(--hand);font-size:1.05rem}
.polaroid:hover{transform:rotate(0) scale(1.04);box-shadow:0 16px 34px rgba(43,39,35,.24);z-index:5}
.p1{width:150px;height:184px;top:6%;left:2%;transform:rotate(-8deg)}.p1 .ph{background:linear-gradient(135deg,#F4C95D,#E8664E)}
.p2{width:140px;height:172px;bottom:8%;left:5%;transform:rotate(5deg)}.p2 .ph{background:linear-gradient(135deg,#87A9C9,#7FA98F)}
.p3{width:150px;height:186px;top:9%;right:3%;transform:rotate(7deg)}.p3 .ph{background:linear-gradient(135deg,#A488C0,#87A9C9);height:100%}
.stamp{position:absolute;bottom:12%;right:6%;width:104px;height:104px;border:3px solid var(--coral);border-radius:8px;display:grid;place-items:center;color:var(--coral);transform:rotate(-12deg);background:rgba(232,102,78,.06);box-shadow:inset 0 0 0 4px rgba(232,102,78,.12)}
.stamp .cn{font-family:'Noto Sans TC',serif;font-weight:700;font-size:1.7rem;writing-mode:vertical-rl;letter-spacing:.08em}
.stamp .en{position:absolute;bottom:6px;font-family:var(--mono);font-size:.5rem;letter-spacing:.12em}
.star{position:absolute;top:16%;left:16%;font-size:1.8rem;animation:bob 3.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-9px) rotate(12deg)}}
@media(max-width:900px){.hero{min-height:auto;padding:46px 0 30px}.decor{display:none}}

section{padding:64px 0}
@media(min-width:1300px){html{font-size:17px}}
@media(min-width:1700px){html{font-size:18.5px}:root{--max:1600px}}
@media(min-width:2200px){html{font-size:20.5px}}
@media(max-width:900px){section{padding:52px 0}.wrap{padding:0 22px}}
@media(max-width:600px){
  section{padding:40px 0}
  .wrap{padding:0 16px}
  .hero{padding:32px 0 26px}
  .wcard{padding:15px;gap:16px}
  .wcard .thumb{height:150px}
  .ocard{padding:18px}
  .nav{height:60px}
}
.mark{font-family:var(--serif);font-weight:600;font-size:clamp(1.6rem,4vw,2.3rem);display:flex;align-items:center;gap:12px;margin-bottom:8px}
.mark .sym{color:var(--coral)}
.sub{color:var(--ink-soft);margin-bottom:32px}
.cooking{background:var(--ink);color:var(--cream);border-radius:26px;padding:38px;position:relative;overflow:hidden}
.cooking::after{content:"🍳";position:absolute;right:26px;top:22px;font-size:2.4rem;animation:bob 4s ease-in-out infinite}
.cooking .lbl{font-family:var(--hand);font-size:1.5rem;color:var(--butter)}
.cooking h2{font-family:var(--serif);font-weight:600;font-size:clamp(1.5rem,3.6vw,2.1rem);margin:8px 0 14px;max-width:640px}
.cooking p{color:#E9E2D4;max-width:660px}
.cooking .tape{position:absolute;left:-30px;top:24px;width:120px;height:26px;background:rgba(244,201,93,.5);transform:rotate(-38deg)}

.work{display:grid;gap:26px}
.wcard{display:grid;grid-template-columns:300px 1fr;gap:26px;background:var(--card);border:2px solid var(--ink);border-radius:22px;padding:20px;align-items:center;transition:transform .2s,box-shadow .2s}
.wcard:hover{transform:translateY(-4px) rotate(-.4deg);box-shadow:8px 8px 0 var(--ink)}
.wcard .thumb{height:190px;border-radius:14px;display:grid;place-items:center;font-size:3rem;color:#fff}
.wcard .thumb.photos{background:none!important;padding:0;gap:5px;overflow:hidden;place-items:stretch}
.wcard .thumb.photos img{width:100%;height:100%;object-fit:cover;border-radius:10px;display:block}
.wcard .thumb.photos.n1{grid-template-columns:1fr}
.wcard .thumb.photos.n2{grid-template-columns:1fr 1fr}
.wcard .thumb.photos.n3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr}
.wcard .thumb.photos.n3 img:first-child{grid-row:1/3}
.wcard:nth-child(1) .thumb{background:linear-gradient(135deg,#E8664E,#F4C95D)}
.wcard:nth-child(2) .thumb{background:linear-gradient(135deg,#87A9C9,#A488C0)}
.wcard:nth-child(3) .thumb{background:linear-gradient(135deg,#7FA98F,#F4C95D)}
.wcard h3{font-family:var(--serif);font-weight:600;font-size:1.5rem}
.wmeta{font-family:var(--mono);font-size:.72rem;color:var(--coral);margin:4px 0 10px}
.wcard p{color:var(--ink-soft);font-size:.98rem}
.wtags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
.wtags span{font-size:.76rem;background:var(--cream);border:1.5px solid var(--line);border-radius:14px;padding:4px 11px}
@media(max-width:680px){.wcard{grid-template-columns:1fr}}

.other{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.ocard{background:var(--card);border:2px solid var(--ink);border-radius:18px;padding:22px;transition:transform .18s}
.ocard:hover{transform:translateY(-4px) rotate(.6deg)}
.ocard .emoji{font-size:1.7rem}.ocard h4{font-family:var(--serif);font-weight:600;font-size:1.2rem;margin:8px 0 4px}
.ocard .oy{font-family:var(--mono);font-size:.66rem;color:var(--ink-faint)}
.ocard p{color:var(--ink-soft);font-size:.92rem;margin-top:8px}
.ocard .go{margin-top:12px;font-family:var(--mono);font-size:.7rem;color:var(--coral);border-bottom:2px solid var(--butter);display:inline-block;padding-bottom:1px}
@media(max-width:560px){.other{grid-template-columns:1fr}}

.gallery{columns:3;column-gap:16px}
@media(max-width:820px){.gallery{columns:2}}@media(max-width:440px){.gallery{columns:1}}
.gtile{position:relative;display:block;break-inside:avoid;margin-bottom:16px;border-radius:16px;overflow:hidden;border:2px solid var(--ink);box-shadow:4px 4px 0 var(--ink);transition:transform .2s,box-shadow .2s}
.gtile:hover{transform:translateY(-4px) rotate(-.5deg);box-shadow:8px 8px 0 var(--coral)}
.gtile .media{width:100%;display:block;transition:transform .55s}.gtile:hover .media{transform:scale(1.07)}
.gtile .ph{display:grid;place-items:center;font-size:2.6rem;color:#fff}
.gov{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;background:linear-gradient(to top,rgba(43,39,35,.85),rgba(43,39,35,.08) 55%,transparent);opacity:0;transition:opacity .3s}
.gtile:hover .gov,.gtile:focus-visible .gov{opacity:1}
.gov .cap{color:#fff;font-family:var(--serif);font-weight:500;font-size:1.08rem}
.gov .view{color:#fff;font-family:var(--mono);font-size:.66rem;margin-top:5px;display:flex;align-items:center;gap:6px;opacity:.92}
.gov .view svg{width:13px;height:13px}
.ig-badge{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;background:#fff;color:var(--coral);display:grid;place-items:center;transform:scale(.5);opacity:0;transition:transform .3s,opacity .3s}
.gtile:hover .ig-badge{transform:scale(1);opacity:1}
.gallery.juicer{column-count:1;column-gap:0}
.gallery.juicer .juicer-feed{width:100%}
.gallery.embed{column-count:auto;display:flex;flex-wrap:nowrap;gap:16px;overflow-x:auto;padding-bottom:12px;scroll-snap-type:x mandatory}
.gallery.embed .instagram-media{flex:0 0 auto;margin:0!important;scroll-snap-align:start}
.ig-follow{display:inline-flex;align-items:center;gap:9px;margin-top:26px;padding:12px 22px;border-radius:30px;border:2px solid var(--ink);background:var(--card);font-weight:500;transition:.18s}
.ig-follow:hover{background:linear-gradient(135deg,#E8664E,#A488C0);color:#fff;border-color:transparent;transform:translateY(-3px) rotate(-1deg)}
.ig-follow .h{font-family:var(--mono);font-size:.82rem}

.langs{display:flex;flex-wrap:wrap;gap:14px}
.lcard{background:var(--card);border:2px solid var(--ink);border-radius:18px;padding:16px 20px;min-width:150px;flex:1 1 150px;transition:transform .18s}
.lcard:hover{transform:translateY(-4px) rotate(-1deg)}
.lcard .greet{font-family:var(--serif);font-weight:600;font-size:1.5rem}
.lcard .lname{font-size:.86rem;color:var(--ink-soft);margin-top:2px}
.lcard .lbar{height:6px;background:var(--cream);border-radius:4px;margin-top:12px;overflow:hidden;border:1px solid var(--line)}
.lcard .lbar span{display:block;height:100%;width:0;background:var(--coral);border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.lcard .llvl{font-family:var(--mono);font-size:.62rem;color:var(--ink-faint);margin-top:7px}

.about-grid{display:grid;grid-template-columns:1.3fr .7fr;gap:36px;align-items:start}
.about-grid p{font-size:1.08rem;color:var(--ink-soft);margin-bottom:16px}
.links{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.links a{font-family:var(--mono);font-size:.76rem;background:var(--card);border:2px solid var(--ink);border-radius:20px;padding:8px 15px;transition:.16s}
.links a:hover{background:var(--coral);border-color:var(--coral);color:#fff;transform:translateY(-2px)}
.chat{background:var(--card);border:2px solid var(--ink);border-radius:22px;padding:18px;box-shadow:6px 6px 0 var(--ink)}
.chat .top{font-family:var(--mono);font-size:.66rem;color:var(--ink-faint);text-align:center;margin-bottom:12px}
.bubble{max-width:80%;padding:9px 14px;border-radius:18px;margin-bottom:9px;font-size:.9rem;line-height:1.45}
.bubble.them{background:var(--cream);border:1.5px solid var(--line);border-bottom-left-radius:5px}
.bubble.me{background:var(--coral);color:#fff;margin-left:auto;border-bottom-right-radius:5px}
@media(max-width:760px){.about-grid{grid-template-columns:1fr}}

footer{padding:40px 0 60px;text-align:center}
.foot-note{font-family:var(--hand);font-size:1.7rem}.foot-mini{font-family:var(--mono);font-size:.66rem;color:var(--ink-faint);margin-top:8px}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s}.reveal.in{opacity:1;transform:none}
:focus-visible{outline:3px solid var(--coral);outline-offset:3px;border-radius:6px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.reveal{opacity:1;transform:none}}

/* ============ ADMIN ============ */
.gear{position:fixed;right:18px;bottom:18px;z-index:70;width:50px;height:50px;border-radius:50%;background:var(--ink);color:var(--cream);border:0;cursor:pointer;font-size:1.3rem;box-shadow:0 8px 20px rgba(43,39,35,.3);transition:transform .2s}
.gear:hover{transform:rotate(45deg) scale(1.06)}
.admin{position:fixed;top:0;right:0;height:100%;width:420px;max-width:100%;background:var(--cream-2);z-index:80;box-shadow:-14px 0 40px rgba(43,39,35,.2);transform:translateX(102%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.admin.open{transform:none}
.admin .ahead{padding:16px 18px;border-bottom:2px solid var(--ink);display:flex;align-items:center;gap:10px;background:var(--ink);color:var(--cream)}
.admin .ahead b{font-family:var(--serif);font-size:1.1rem;flex:1}
.admin .ahead button{background:transparent;border:1.5px solid var(--cream);color:var(--cream);border-radius:16px;padding:5px 10px;font-size:.7rem;font-family:var(--mono);cursor:pointer}
.admin .ahead .x{border:0;font-size:1.3rem;padding:0 6px}
.abody{overflow-y:auto;padding:14px 18px 60px;flex:1}
.saved{font-family:var(--mono);font-size:.64rem;color:var(--sage);height:14px;margin-bottom:6px}
.grp{border:1.5px solid var(--line);border-radius:12px;margin-bottom:12px;background:var(--card);overflow:hidden}
.grp>summary{cursor:pointer;padding:11px 14px;font-family:var(--serif);font-weight:600;font-size:1rem;list-style:none;display:flex;align-items:center;gap:8px}
.grp>summary::-webkit-details-marker{display:none}
.grp>summary::before{content:"▸";color:var(--coral);transition:transform .2s}
.grp[open]>summary::before{transform:rotate(90deg)}
.gc{padding:4px 14px 14px}
.fld{margin-bottom:12px}
.fld>label{display:block;font-size:.74rem;color:var(--ink-soft);margin-bottom:4px;font-weight:600}
.fld input,.fld textarea,.fld select{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:8px 10px;font-family:var(--sans);font-size:.86rem;background:var(--cream-2);color:var(--ink);resize:vertical}
.fld textarea{min-height:52px}
.fld select{cursor:pointer;font-size:.95rem}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:2px solid var(--coral);border-color:var(--coral)}
.mltab{display:flex;gap:4px;margin-bottom:5px}
.mltab button{font-family:var(--mono);font-size:.6rem;border:1.5px solid var(--line);background:var(--cream-2);border-radius:12px;padding:3px 9px;cursor:pointer;color:var(--ink-soft)}
.mltab button.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.item{border:1.5px dashed var(--line);border-radius:10px;padding:10px;margin-bottom:10px;position:relative}
.item .del{position:absolute;top:8px;right:8px;background:var(--coral);color:#fff;border:0;border-radius:8px;font-size:.62rem;padding:3px 8px;cursor:pointer;font-family:var(--mono)}
.addbtn{width:100%;border:1.5px dashed var(--coral);color:var(--coral);background:transparent;border-radius:10px;padding:8px;cursor:pointer;font-family:var(--mono);font-size:.74rem}
.hint{font-size:.68rem;color:var(--ink-faint);margin:2px 0 8px;line-height:1.5}
.fontchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.fchip{font-family:var(--mono);font-size:.62rem;border:1.5px solid var(--line);background:var(--cream-2);border-radius:12px;padding:3px 8px;cursor:pointer;color:var(--ink-soft)}
.fchip:hover{border-color:var(--coral);color:var(--coral)}
.fontprev{margin-top:8px;padding:10px 12px;border:1.5px dashed var(--line);border-radius:9px;background:#fff;font-size:1.35rem;line-height:1.35;color:var(--ink)}
.admin-overlay{position:fixed;inset:0;background:rgba(43,39,35,.4);z-index:75;opacity:0;pointer-events:none;transition:opacity .3s}
.modrow{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--card)}
.modname{font-family:var(--serif);font-weight:600}
.modbtns button{border:1.5px solid var(--ink);background:var(--cream-2);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1rem;margin-left:5px;color:var(--ink)}
.modbtns button:disabled{opacity:.28;cursor:default}
#admin-toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:90;background:var(--ink);color:var(--cream);padding:11px 20px;border-radius:22px;font-size:.85rem;box-shadow:0 10px 28px rgba(43,39,35,.35);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;max-width:92vw;text-align:center;line-height:1.5}
#admin-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

function clone(o){return JSON.parse(JSON.stringify(o));}
function isObj(x){return x&&typeof x==="object"&&!Array.isArray(x);}
function merge(def,ov){
  if(Array.isArray(def)) return Array.isArray(ov)?ov:clone(def);
  if(isObj(def)){const out={};for(const k in def)out[k]=merge(def[k], ov&&ov[k]!==undefined?ov[k]:undefined);return out;}
  return ov!==undefined?ov:def;
}

/* 動態載入 Google Fonts：打進字體名稱就自動抓（存在才顯示，否則自動退回備用字體） */
const loadedFonts=new Set();
const GENERIC=["serif","sans-serif","monospace","cursive","system-ui","ui-monospace","ui-serif","ui-sans-serif","-apple-system"];
function loadGoogleFont(name){
  name=(name||"").trim().replace(/^['"]|['"]$/g,"");
  if(!name||GENERIC.includes(name.toLowerCase()))return;
  if((STATE&&STATE.settings&&STATE.settings.customFonts||[]).some(f=>(f.name||"").toLowerCase()===name.toLowerCase()))return;
  const key=name.toLowerCase();if(loadedFonts.has(key))return;loadedFonts.add(key);
  const l=document.createElement("link");l.rel="stylesheet";
  l.href="https://fonts.googleapis.com/css2?family="+encodeURIComponent(name).replace(/%20/g,"+")+"&display=swap";
  document.head.appendChild(l);
}
function loadStack(stack){(stack||"").split(",").forEach(loadGoogleFont);}
function loadAllFonts(){for(const l in STATE.settings.fonts){loadStack(STATE.settings.fonts[l].serif);loadStack(STATE.settings.fonts[l].sans);}}

function applyFonts(){
  const f=STATE.settings.fonts[LANG]||STATE.settings.fonts.en;
  const S=document.documentElement.style;
  S.setProperty("--serif",f.serif);S.setProperty("--sans",f.sans);
  if(f.hand)S.setProperty("--hand",f.hand);
  S.setProperty("--note",f.note||f.hand||"var(--hand)");
  if(f.mono)S.setProperty("--mono",f.mono);
}
let _cfSig="";
function injectCustomFonts(){
  const cf=STATE.settings.customFonts||[];
  const sig=cf.length+"|"+cf.map(f=>(f.name||"")+":"+((f.url||"").length)).join(",");
  let el=document.getElementById("custom-fonts");
  if(el&&sig===_cfSig)return;
  _cfSig=sig;
  if(!el){el=document.createElement("style");el.id="custom-fonts";document.head.appendChild(el);}
  el.textContent=cf.map(f=>`@font-face{font-family:'${(f.name||"").replace(/'/g,"")}';src:url(${f.url});font-display:swap;}`).join("\n");
}

function renderGallery(force){
  const grid=document.getElementById("gallery-grid");
  const posts=(STATE.settings.igPosts||"").split("\n").map(s=>s.trim()).filter(u=>u.indexOf("instagram.com")>=0);
  const feed=(STATE.settings.juicer||"").trim();
  if(force)galleryBuilt=false;

  if(posts.length){
    grid.classList.remove("juicer");grid.classList.add("embed");
    if(!galleryBuilt){
      grid.innerHTML=posts.map(u=>`<blockquote class="instagram-media" data-instgrm-permalink="${u}" data-instgrm-version="14"></blockquote>`).join("");
      if(!document.getElementById("ig-embed-js")){
        const s=document.createElement("script");s.id="ig-embed-js";s.async=true;s.src="https://www.instagram.com/embed.js";document.body.appendChild(s);
      }
      galleryBuilt=true;
    }
    if(window.instgrm&&window.instgrm.Embeds)window.instgrm.Embeds.process();
    return;
  }

  if(feed){
    grid.classList.remove("embed");grid.classList.add("juicer");
    if(!galleryBuilt){
      grid.innerHTML=`<ul class="juicer-feed" data-feed-id="${feed}" data-columns="3" data-per="9"></ul>`;
      let s=document.getElementById("juicer-js");
      if(s)s.remove();
      s=document.createElement("script");s.id="juicer-js";s.async=true;s.defer=true;
      s.src="https://www.juicer.io/embed/"+feed+"/embed-code.js";document.body.appendChild(s);
      galleryBuilt=true;
    } else if(window.juicer&&window.juicer.load){try{window.juicer.load();}catch(e){}}
    return;
  }

  grid.classList.remove("juicer","embed");grid.innerHTML="";
}

function primaryFont(stack){const m=(stack||"").match(/['"]?([^'",]+)['"]?/);return m?m[1].trim():"";}
function fontStack(lang,name,role){
  const g={serif:"serif",sans:"sans-serif",hand:"cursive",note:"cursive",mono:"monospace"}[role]||"sans-serif";
  const n="'"+String(name).replace(/'/g,"")+"'";
  if(lang==="zh")return n+", 'Noto Sans TC', "+g;
  if(lang==="ko")return n+", 'Noto Sans KR', "+g;
  return n+", "+g;
}
function allFontNames(){
  const out=[];
  for(const L of LANGS){const g=FONT_SUG[L]||{};["serif","sans","hand","note","mono"].forEach(r=>(g[r]||[]).forEach(f=>out.push(f)));}
  (STATE.settings.customFonts||[]).forEach(f=>out.push(f.name));
  return out;
}
function fontField(lang,role){
  const val=STATE.settings.fonts[lang][role];
  const cur=primaryFont(val);
  let opts=allFontNames();
  if(cur)opts.unshift(cur);
  const seen=new Set();
  opts=opts.filter(o=>{const k=(o||"").toLowerCase();if(!o||seen.has(k))return false;seen.add(k);return true;});
  opts.forEach(loadGoogleFont);
  const optionsHtml=opts.map(f=>`<option value="${esc(f)}" style="font-family:'${esc(f)}'"${f.toLowerCase()===cur.toLowerCase()?" selected":""}>${esc(f)}</option>`).join("");
  return `<div class="fld">
    <label>${LANG_LABEL[lang]}・${ROLE_LABEL[role]||role} (${role})</label>
    <select class="fontsel" data-font="${lang}.${role}" style="font-family:'${esc(cur)}'">${optionsHtml}</select>
    <div class="fontprev" data-fprev="${lang}.${role}" style="font-family:${esc(val)}">${FONT_SAMPLE[lang]}</div>
  </div>`;
}

    <div class="fld"><label>成果照片（每行一個路徑，最多 3 張）</label><textarea data-arrlines="work.${i}.photos" style="min-height:58px" placeholder="images/a.jpg&#10;images/b.jpg&#10;images/c.jpg">${esc((w.photos||[]).join("\n"))}</textarea><div class="hint">照片放進 GitHub 的 <code>images/</code> 資料夾，這裡填路徑（如 <code>images/flexium-1.jpg</code>）。填了會取代左邊的圖示。</div></div>
    </div>`).join("")+`<button class="addbtn" data-add="work">+ 新增作品</button>`);

  // Other repeater
  html+=grp("⁕ 其他的事",trBtn("other")+'<div class="hint" style="color:var(--ink-soft)">▸ 區塊標題與說明</div>'+mlLangTabs()+mlField("s_other")+mlField("s_other_sub")+'<div class="hint" style="color:var(--ink-soft)">▸ 各項目</div>'+STATE.other.map((o,i)=>`<div class="item"><button class="del" data-del="other" data-i="${i}">刪除</button>
    <div class="fld"><label>Emoji</label><input data-arr="other.${i}.emoji" value="${esc(o.emoji)}"></div>
    <div class="fld"><label>年份 / 標記</label><input data-arr="other.${i}.year" value="${esc(o.year)}"></div>
    <div class="fld"><label>連結網址</label><input data-arr="other.${i}.url" value="${esc(o.url)}"></div>
    ${mlLangTabs()}
    <div class="fld"><label>標題（${LANG_LABEL[adminLang]}）</label><input data-arrml="other.${i}.title" value="${esc(o.title[adminLang])}"></div>
    <div class="fld"><label>描述（${LANG_LABEL[adminLang]}）</label><textarea data-arrml="other.${i}.desc">${esc(o.desc[adminLang])}</textarea></div>
    <div class="fld"><label>連結文字（${LANG_LABEL[adminLang]}）</label><input data-arrml="other.${i}.go" value="${esc(o.go[adminLang])}"></div>
    </div>`).join("")+`<button class="addbtn" data-add="other">+ 新增項目</button>`);

  // Languages repeater
  html+=grp("✿ 語言能力",trBtn("lang")+'<div class="hint" style="color:var(--ink-soft)">▸ 區塊標題與說明</div>'+mlLangTabs()+mlField("s_lang")+mlField("s_lang_sub")+'<div class="hint" style="color:var(--ink-soft)">▸ 各語言卡片</div>'+STATE.languages.map((l,i)=>`<div class="item"><button class="del" data-del="languages" data-i="${i}">刪除</button>
    <div class="fld"><label>打招呼</label><input data-arr="languages.${i}.greet" value="${esc(l.greet)}"></div>
    <div class="fld"><label>語言名稱</label><input data-arr="languages.${i}.name" value="${esc(l.name)}"></div>
    </div>`).join("")+`<button class="addbtn" data-add="languages">+ 新增語言</button>`,true);

  F.innerHTML=html;
  if(_openGroups.size)F.querySelectorAll("details.grp").forEach(d=>{const s=d.querySelector("summary");if(s)d.open=_openGroups.has(s.textContent);});
  bindForms();
  if(_body)_body.scrollTop=_scroll;
}

function getPath(obj,path){return path.split(".").reduce((a,k)=>a[k],obj);}
function setPath(obj,path,val){const ks=path.split(".");const last=ks.pop();ks.reduce((a,k)=>a[k],obj)[last]=val;}

function bindForms(){
  const F=document.getElementById("forms");
  // lang tabs inside admin
  F.querySelectorAll(".mltab button").forEach(b=>b.addEventListener("click",()=>{adminLang=b.dataset.al;buildForms();}));
  // ui multilingual
  F.querySelectorAll("[data-ui]").forEach(inp=>inp.addEventListener("input",()=>{STATE.ui[inp.dataset.ui][inp.dataset.l]=inp.value;afterEdit();}));
  // settings
  F.querySelectorAll("[data-set]").forEach(inp=>inp.addEventListener("input",()=>{
    STATE.settings[inp.dataset.set]=inp.value;afterEdit(inp.dataset.set==="juicer"||inp.dataset.set==="igPosts");}));
  F.querySelectorAll("[data-sp]").forEach(inp=>inp.addEventListener("input",()=>{
    setPath(STATE.settings,inp.dataset.sp,inp.value);afterEdit();}));
  // fonts (dropdown → live preview, Word-style)
  F.querySelectorAll("select.fontsel").forEach(sel=>sel.addEventListener("change",()=>{
    const p=sel.dataset.font.split("."),l=p[0],k=p[1];
    const name=sel.value;const stack=fontStack(l,name,k);
    STATE.settings.fonts[l][k]=stack;loadGoogleFont(name);
    sel.style.fontFamily="'"+name.replace(/'/g,"")+"'";
    const pv=F.querySelector('[data-fprev="'+l+'.'+k+'"]');if(pv)pv.style.fontFamily=stack;
    afterEdit();
  }));
  const cf=F.querySelector("#cf-file");
  if(cf)cf.addEventListener("change",()=>{
    const files=[...cf.files];if(!files.length)return;
    const anyBig=files.some(f=>f.size>1500000);
    let done=0;const added=[];
    files.forEach(file=>{
      const nm=(file.name.replace(/\.(woff2|woff|ttf|otf)$/i,"").trim())||file.name;
      const r=new FileReader();
      r.onload=()=>{
        STATE.settings.customFonts=(STATE.settings.customFonts||[]).filter(f=>(f.name||"").toLowerCase()!==nm.toLowerCase());
        STATE.settings.customFonts.push({name:nm,url:r.result});
        added.push(nm);
        if(++done===files.length){saveLocal();injectCustomFonts();buildForms();
          toast(anyBig?"檔案偏大 ⚠️ 瀏覽器上限約 5MB，中文 .ttf 常超過、重開會消失。建議改用『網址字體』自架，或轉成 .woff2":("已上傳 "+added.length+" 個字體："+added.join("、")),anyBig?'var(--coral)':undefined);}
      };
      r.onerror=()=>{if(++done===files.length){saveLocal();injectCustomFonts();buildForms();toast(added.length?("已上傳 "+added.length+" 個字體"):"讀取檔案失敗",added.length?undefined:'var(--coral)');}};
      r.readAsDataURL(file);
    });
  });
  const ua=F.querySelector("#cf-url-add");
  if(ua)ua.addEventListener("click",()=>{
    const nm=(F.querySelector("#cf-url-name").value||"").trim();
    const srcu=(F.querySelector("#cf-url-src").value||"").trim();
    if(!nm||!srcu){toast("請填字體名稱和網址／路徑",'var(--coral)');return;}
    STATE.settings.customFonts=(STATE.settings.customFonts||[]).filter(f=>(f.name||"").toLowerCase()!==nm.toLowerCase());
    STATE.settings.customFonts.push({name:nm,url:srcu});
    saveLocal();injectCustomFonts();buildForms();toast("已加入「"+nm+"」——把字體檔放到該路徑就會生效");
  });
  F.querySelectorAll("[data-cfdel]").forEach(b=>b.addEventListener("click",()=>{
    STATE.settings.customFonts.splice(+b.dataset.cfdel,1);saveLocal();injectCustomFonts();buildForms();toast("已刪除字體");
  }));
  // arrays simple
  F.querySelectorAll("[data-arr]").forEach(inp=>inp.addEventListener("input",()=>{setPath(STATE,inp.dataset.arr,inp.value);afterEdit();}));
  F.querySelectorAll("[data-arrnum]").forEach(inp=>inp.addEventListener("input",()=>{setPath(STATE,inp.dataset.arrnum,Math.max(0,Math.min(100,parseInt(inp.value)||0)));afterEdit();}));
  F.querySelectorAll("[data-arrml]").forEach(inp=>inp.addEventListener("input",()=>{setPath(STATE,inp.dataset.arrml+"."+adminLang,inp.value);afterEdit();}));
  F.querySelectorAll("[data-tags]").forEach(inp=>inp.addEventListener("input",()=>{setPath(STATE,inp.dataset.tags+".tags",inp.value.split(",").map(s=>s.trim()).filter(Boolean));afterEdit();}));
  F.querySelectorAll("[data-arrlines]").forEach(inp=>inp.addEventListener("input",()=>{setPath(STATE,inp.dataset.arrlines,inp.value.split("\n").map(s=>s.trim()).filter(Boolean));afterEdit();}));
  // add / delete
  F.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",()=>{addItem(b.dataset.add);}));
  F.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",()=>{STATE[b.dataset.del].splice(+b.dataset.i,1);saveLocal();renderAll();buildForms();}));
  F.querySelectorAll("[data-tr]").forEach(b=>b.addEventListener("click",()=>doTranslate(b.dataset.tr,b)));
  F.querySelectorAll("[data-mv]").forEach(b=>b.addEventListener("click",()=>{
    const i=+b.dataset.i, j=i+(b.dataset.mv==="up"?-1:1);
    if(j<0||j>=STATE.order.length)return;
    const o=STATE.order;[o[i],o[j]]=[o[j],o[i]];
    saveLocal();applyOrder();buildForms();
  }));
}
function afterEdit(rebuildGallery){saveLocal();if(rebuildGallery){renderContent();renderGallery(true);}else{renderContent();}}
function addItem(type){
  const ml=()=>({zh:"",en:"",ko:""});
  if(type==="work")STATE.work.push({emoji:"✨",title:"New",meta:ml(),desc:ml(),tags:[]});
  if(type==="other")STATE.other.push({emoji:"✦",title:ml(),year:"",desc:ml(),go:ml(),url:"#"});
  if(type==="languages")STATE.languages.push({greet:"Hi",name:"Language"});
  saveLocal();renderAll();buildForms();
}

/* ===== AI 翻譯：中文為準 → EN / 한（在地化、文法校對；在 Claude.ai 預覽可用） ===== */
const TRANSLATE_PROMPT=`You are a professional localization translator for a personal portfolio website. Translate each Traditional Chinese value into natural, grammatically correct, LOCALIZED English ("en") and Korean ("ko"). Rules: keep HTML tags such as <br> exactly; keep emojis; do NOT translate proper nouns / technical terms (Lydia, Yen-Yi Chen, Six Sigma, 8D, SQE, PCB, PCBA, SOP, FPC, UT Dallas, JSOM, MEKTEC, Flexium, TITAS, YouTube, Instagram) and keep all numbers/percentages. Warm, friendly, professional tone. Return ONLY minified JSON (no markdown, no commentary): an object mapping each input key to {"en":"...","ko":"..."}. Input:\n`;
async function callClaude(prompt){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  return (data.content||[]).filter(i=>i.type==="text").map(i=>i.text).join("");
}
async function aiTranslate(map){
  const txt=await callClaude(TRANSLATE_PROMPT+JSON.stringify(map));
  const clean=txt.replace(/```json/gi,"").replace(/```/g,"").trim();
  return JSON.parse(clean);
}
async function mtTranslate(text,target){
  try{
    const res=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=zh-CN|"+target);
    const d=await res.json();
    return (d.responseData&&d.responseData.translatedText)||"";
  }catch(e){return "";}
}
async function runTranslate(map,apply,btn){
  const clean={};for(const k in map){if((map[k]||"").trim())clean[k]=map[k];}
  if(!Object.keys(clean).length){toast("這一區沒有可翻譯的中文內容",'var(--coral)');return;}
  const label=btn?btn.textContent:"";if(btn){btn.disabled=true;btn.textContent="🌐 翻譯中…";}
  let results=null,usedMT=false;
  try{
    const tr=await aiTranslate(clean);
    results=Object.keys(tr).filter(k=>tr[k]).map(k=>({k,en:tr[k].en,ko:tr[k].ko}));
  }catch(e){
    usedMT=true;results=[];
    for(const k in clean){
      const en=await mtTranslate(clean[k],"en");
      const ko=await mtTranslate(clean[k],"ko");
      if(en&&ko)results.push({k,en,ko});
    }
    if(!results.length){toast("翻譯失敗，請把中文貼到對話裡我幫你翻。",'var(--coral)');if(btn){btn.disabled=false;btn.textContent=label;}return;}
  }
  results.forEach(r=>apply(r.k,{en:r.en,ko:r.ko}));
  saveLocal();renderContent();buildForms();
  toast(usedMT?"已用機器翻譯更新 EN／한（品質普通，可再手動微調）":"已用 AI 翻譯更新 EN / 한 ☺︎");
}
function doTranslate(type,btn){
  let map={},apply;
  const uiBatch=(keys)=>{keys.forEach(k=>map[k]=STATE.ui[k].zh);apply=(k,tr)=>{if(STATE.ui[k]){STATE.ui[k].en=tr.en;STATE.ui[k].ko=tr.ko;}};};
  if(type==="hero")uiBatch(HERO_KEYS);
  else if(type==="cook")uiBatch(COOK_KEYS);
  else if(type==="sec")uiBatch(SEC_KEYS);
  else if(type==="about")uiBatch(ABOUT_KEYS);
  else if(type==="work"){map["s_work"]=STATE.ui.s_work.zh;map["s_work_sub"]=STATE.ui.s_work_sub.zh;STATE.work.forEach((w,i)=>{map["meta_"+i]=w.meta.zh;map["desc_"+i]=w.desc.zh;});apply=(k,tr)=>{if(k.indexOf("meta_")===0||k.indexOf("desc_")===0){const p=k.split("_"),f=p[0],i=p[1];if(STATE.work[i]){STATE.work[i][f].en=tr.en;STATE.work[i][f].ko=tr.ko;}}else if(STATE.ui[k]){STATE.ui[k].en=tr.en;STATE.ui[k].ko=tr.ko;}};}
  else if(type==="other"){map["s_other"]=STATE.ui.s_other.zh;map["s_other_sub"]=STATE.ui.s_other_sub.zh;STATE.other.forEach((o,i)=>{map["title_"+i]=o.title.zh;map["desc_"+i]=o.desc.zh;map["go_"+i]=o.go.zh;});apply=(k,tr)=>{if(k.indexOf("s_")===0){if(STATE.ui[k]){STATE.ui[k].en=tr.en;STATE.ui[k].ko=tr.ko;}}else{const p=k.split("_"),f=p[0],i=p[1];if(STATE.other[i]){STATE.other[i][f].en=tr.en;STATE.other[i][f].ko=tr.ko;}}};}
  else if(type==="gal")uiBatch(["s_gal","s_gal_sub","galView","galFollow"]);
  else if(type==="lang")uiBatch(["s_lang","s_lang_sub"]);
  runTranslate(map,apply,btn);
}

/* admin open/close + gate (in-page, no browser dialogs — works inside preview/sandbox) */
const admin=document.getElementById("admin"),overlay=document.getElementById("admin-overlay");
let unlocked=false, resetArmed=false;
function toast(m,color){
  const el=document.getElementById("admin-toast");
  if(el){el.textContent=m;el.style.background=(color==='var(--coral)')?'var(--coral-deep)':'var(--ink)';el.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove("show"),3800);}
  const el2=document.getElementById("msg");if(el2){el2.textContent=m;el2.style.color=color||"var(--sage)";}
}
function showAdminView(){
  document.getElementById("login").style.display=unlocked?"none":"block";
  document.getElementById("panel").style.display=unlocked?"block":"none";
  document.getElementById("admin-actions").style.display=unlocked?"inline-flex":"none";
  if(unlocked)buildForms();
}
function openAdmin(){admin.classList.add("open");overlay.classList.add("open");showAdminView();
  setTimeout(()=>{const p=document.getElementById("pass-input");if(!unlocked&&p)p.focus();},350);}
function closeAdmin(){admin.classList.remove("open");overlay.classList.remove("open");}
function tryUnlock(){const v=document.getElementById("pass-input").value;
  if(v===ADMIN_PASS){unlocked=true;document.getElementById("login-msg").textContent="";showAdminView();}
  else{document.getElementById("login-msg").textContent="通關碼錯誤，再試一次";}}
document.getElementById("gear").addEventListener("click",openAdmin);
document.getElementById("btn-close").addEventListener("click",closeAdmin);
overlay.addEventListener("click",closeAdmin);
document.getElementById("pass-go").addEventListener("click",tryUnlock);
document.getElementById("pass-input").addEventListener("keydown",(e)=>{if(e.key==="Enter")tryUnlock();});
setTimeout(openAdmin,300); // 後台頁：載入即開啟編輯

/* export / import / reset (in-page feedback) */
document.getElementById("btn-export").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify(STATE,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="content.json";
  document.body.appendChild(a);a.click();a.remove();
  toast("已下載 content.json — 上傳到主機（與網頁同資料夾）即可發布 ☺︎");
});
document.getElementById("btn-import").addEventListener("click",()=>document.getElementById("import-file").click());
document.getElementById("import-file").addEventListener("change",(e)=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{
    let data;
    try{data=JSON.parse(r.result);}catch(err){toast("檔案不是有效的 JSON（可能複製到一半或損毀）",'var(--coral)');return;}
    try{STATE=merge(DEFAULTS,data);saveLocal();renderAll();buildForms();toast("匯入成功 ☺︎");}
    catch(err){toast("匯入成功但顯示出錯——請改用最新版 admin.html 再匯入一次",'var(--coral)');}
  };
  r.readAsText(f);
});
document.getElementById("btn-reset").addEventListener("click",(e)=>{
  if(!resetArmed){resetArmed=true;e.target.textContent="確認?";toast("再按一次「確認?」會還原全部內容",'var(--coral)');
    setTimeout(()=>{resetArmed=false;e.target.textContent="重設";},3000);return;}
  resetArmed=false;e.target.textContent="重設";STATE=clone(DEFAULTS);saveLocal();renderAll();buildForms();toast("已還原預設內容");
});

/* ================= BOOT ================= */
async function boot(){
  let data=null;
  try{const r=await fetch("content.json",{cache:"no-store"});if(r.ok)data=await r.json();}catch(e){}
  if(!data&&window.__SEED__)data=window.__SEED__;
  if(!data)data=loadLocal();
  STATE=data?merge(DEFAULTS,data):clone(DEFAULTS);
  loadAllFonts();
  renderAll();observe();
}
boot();
</script>
